<!doctype html>
<html lang="ko" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Sugar logos</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Speech Synthesis Warmup for mobile browsers
      const warmupTTS = () => {
        if (window.speechSynthesis) {
          // Clear any stuck state
          window.speechSynthesis.cancel();
          // Short actual character to fire the engine
          const utterance = new SpeechSynthesisUtterance('.');
          utterance.volume = 0;
          window.speechSynthesis.speak(utterance);
        }
        window.removeEventListener('click', warmupTTS);
        window.removeEventListener('touchstart', warmupTTS);
      };
      window.addEventListener('click', warmupTTS);
      window.addEventListener('touchstart', warmupTTS);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
